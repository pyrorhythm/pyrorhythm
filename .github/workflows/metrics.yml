name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          experimental_features: metrics.setup.community.templates
          setup_community_templates: pyrorhythm/pyrorhythm@main:terminal-glass+trust
          template: "@terminal-glass"
          base: header, activity, community, repositories, metadata
